<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ABC Melody Staff App</title>
  <style>
    :root {
      --ink: #27231f;
      --muted: #766f66;
      --line: #ded6c8;
      --accent: #7a5c3e;
      --accent-dark: #563f2a;
      --danger: #b45309;
      --ok: #2f6f4e;
      --shadow: 0 18px 45px rgba(39, 35, 31, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(135deg, #f6f3ee, #ebe4d8);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Yu Gothic UI", sans-serif;
    }

    .app {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: end;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      background: rgba(255,255,255,0.58);
      color: var(--muted);
      white-space: nowrap;
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 18px;
      align-items: start;
    }

    .card {
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid rgba(222, 214, 200, 0.85);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .card-head h2 {
      margin: 0;
      font-size: 17px;
    }

    textarea {
      width: 100%;
      min-height: 360px;
      border: 0;
      resize: vertical;
      padding: 18px 20px;
      background: transparent;
      color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 14px;
      line-height: 1.55;
      outline: none;
    }

    .chord-box {
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,0.32);
    }

    .chord-box textarea { min-height: 120px; }

    .mini-note {
      padding: 0 20px 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .controls {
      display: grid;
      gap: 12px;
      padding: 16px 20px 20px;
      border-top: 1px solid var(--line);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: var(--accent-dark); }

    button.secondary {
      background: #eee6da;
      color: var(--ink);
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    input[type="number"], select {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fffaf1;
      color: var(--ink);
      padding: 9px 10px;
      font: inherit;
      min-width: 92px;
    }

    input[type="range"] { width: 120px; }

    .score-wrap {
      padding: 16px 18px 24px;
      min-height: 420px;
      overflow-x: auto;
    }

    #score {
      background: #fff;
      border-radius: 18px;
      padding: 12px;
      min-width: 680px;
    }

    .status, .test-panel {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      padding: 0 20px 16px;
    }

    .error { color: var(--danger); }
    .ok { color: var(--ok); }

    .hint {
      padding: 14px 20px 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.75;
      border-top: 1px solid var(--line);
    }

    .test-panel {
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .test-panel ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      header { align-items: start; flex-direction: column; }
      #score { min-width: 620px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>ABC Melody Staff App</h1>
        <p class="lead">ABC欄のメロディーだけを五線譜に変換します。メロディーも伴奏もピアノ風で再生します。</p>
      </div>
      <div class="badge">ピアノメロディー + ピアノ伴奏</div>
    </header>

    <section class="grid">
      <div class="card">
        <div class="card-head">
          <h2>ABC譜 メロディー</h2>
          <button class="secondary" id="sampleBtn" type="button">サンプルに戻す</button>
        </div>
        <div class="controls">
          <div class="row">
            <button id="renderBtn" type="button">五線譜にする</button>
            <button id="unlockAudioBtn" type="button">音声を有効化</button>
            <button id="playBtn" type="button">再生</button>
            <button class="secondary" id="stopBtn" type="button">停止</button>
            <button class="secondary" id="testBtn" type="button">テスト音</button>
          </div>
          <div class="row">
            <label>テンポ
              <input id="tempoInput" type="number" min="40" max="240" value="112">
            </label>
            <label>音量
              <input id="volumeInput" type="range" min="0" max="1" step="0.05" value="0.75">
            </label>
            <label>伴奏
              <select id="accompSelect">
                <option value="on" selected>ピアノ伴奏あり</option>
                <option value="off">メロディーのみ</option>
              </select>
            </label>
          </div>
        </div>
        <textarea id="abcInput" spellcheck="false"></textarea>

        <div class="chord-box">
          <div class="card-head">
            <h2>コード譜 伴奏用</h2>
          </div>
          <textarea id="chordInput" spellcheck="false"></textarea>
          <div class="mini-note">ここに入れたコード進行は再生時のピアノ伴奏だけに使います。五線譜には表示しません。</div>
        </div>
        <div class="hint">五線譜はアプリ内で直接描画します。ABC欄にコード名が混ざっていても、自動で取り除いて表示します。</div>
      </div>

      <div class="card">
        <div class="card-head">
          <h2>五線譜</h2>
        </div>
        <div class="score-wrap">
          <div id="score"></div>
        </div>
        <div id="status" class="status">準備できています。</div>
        <div id="testPanel" class="test-panel"></div>
      </div>
    </section>
  </main>

  <script>
    'use strict';

    var LF = String.fromCharCode(10);
    var CR = String.fromCharCode(13);
    var QUOTE = String.fromCharCode(34);
    var APOST = String.fromCharCode(39);

    var SAMPLE_LINES = [
      'X:1',
      'T:C Major Modern Jazz Etude',
      'M:4/4',
      'L:1/8',
      'Q:1/4=112',
      'K:C',
      'D2 z2 F A {^G}A c | _B _A G B _D _E F G |',
      'E2 z G B ^F G d | c B A G E2 z A |',
      'D2 z2 F A c B | _B _A G B _D _E F G |',
      'D2 z2 F E G A | E2 z G B A G E |',
      'D2 z2 F A {^G}A c | G _A _B B _D _E F G |',
      'C2 z2 E G {^F}G B | c B A G ^F2 z E |',
      'D2 z2 F A c B | B _D _E F _A _B B _A |',
      'E2 z2 G B {^F}G E | A2 z2 C E {^G}A c |'
    ];

    var SAMPLE_CHORD_LINES = [
      'Dm7 | G7alt | Cmaj7(#11) | Am7 |',
      'Dm7 | G7alt | Cmaj7      | Am7 |',
      'Dm7 | G7alt | Cmaj7(#11) | Am7 |',
      'Dm7 | G7alt | Cmaj7(#11) | Am7 |'
    ];

    var SAMPLE_ABC = SAMPLE_LINES.join(LF);
    var SAMPLE_CHORDS = SAMPLE_CHORD_LINES.join(LF);

    var abcInput = document.getElementById('abcInput');
    var chordInput = document.getElementById('chordInput');
    var statusEl = document.getElementById('status');
    var testPanel = document.getElementById('testPanel');
    var tempoInput = document.getElementById('tempoInput');
    var volumeInput = document.getElementById('volumeInput');
    var accompSelect = document.getElementById('accompSelect');
    var scoreEl = document.getElementById('score');

    var visualObj = null;
    var audioContext = null;
    var activeNodes = [];
    var timers = [];
    var masterGain = null;
    var reverbDelay = null;

    abcInput.value = SAMPLE_ABC;
    chordInput.value = SAMPLE_CHORDS;

    function setStatus(message, isError) {
      statusEl.innerHTML = message;
      statusEl.className = isError ? 'status error' : 'status';
    }

    function escapeHtml(text) {
      return String(text)
        .split('&').join('&amp;')
        .split('<').join('&lt;')
        .split('>').join('&gt;')
        .split(QUOTE).join('&quot;');
    }

    function normalizeNewlines(text) {
      return String(text || '').split(CR + LF).join(LF).split(CR).join(LF);
    }

    function stripChordSymbols(text) {
      var input = String(text || '');
      var output = '';
      var insideQuote = false;
      for (var i = 0; i < input.length; i += 1) {
        var ch = input[i];
        if (ch === QUOTE) {
          insideQuote = !insideQuote;
        } else if (!insideQuote) {
          output += ch;
        }
      }
      return output;
    }

    function hasChordSymbols(text) {
      return String(text || '').indexOf(QUOTE) !== -1;
    }

    function isHeaderLine(line) {
      if (!line || line.length < 2) return false;
      var code = line.charCodeAt(0);
      return code >= 65 && code <= 90 && line[1] === ':';
    }

    function removeGraceNotes(text) {
      var output = '';
      var inside = false;
      for (var i = 0; i < text.length; i += 1) {
        if (text[i] === '{') {
          inside = true;
        } else if (text[i] === '}') {
          inside = false;
        } else if (!inside) {
          output += text[i];
        }
      }
      return output;
    }

    function melodyBodyText(rawAbc) {
      var lines = normalizeNewlines(stripChordSymbols(rawAbc)).split(LF);
      var body = [];
      for (var i = 0; i < lines.length; i += 1) {
        var line = lines[i].trim();
        if (!isHeaderLine(line)) body.push(line);
      }
      return removeGraceNotes(body.join(' '));
    }

    function cleanTokenText(text) {
      var out = '';
      for (var i = 0; i < text.length; i += 1) {
        var ch = text[i];
        if (ch === '|' || ch === '[' || ch === ']' || ch === '(' || ch === ')') out += ' ';
        else out += ch;
      }
      return out;
    }

    function tokenizeMelody(rawAbc) {
      var raw = cleanTokenText(melodyBodyText(rawAbc)).split(' ');
      var tokens = [];
      for (var i = 0; i < raw.length; i += 1) {
        var token = raw[i].trim();
        if (token) tokens.push(token);
      }
      return tokens;
    }

    function melodyBodyTextWithGrace(rawAbc) {
      var lines = normalizeNewlines(stripChordSymbols(rawAbc)).split(LF);
      var body = [];
      for (var i = 0; i < lines.length; i += 1) {
        var line = lines[i].trim();
        if (!isHeaderLine(line)) body.push(line);
      }
      return body.join(' ');
    }

    function tokenizeMelodyForPlayback(rawAbc) {
      var text = melodyBodyTextWithGrace(rawAbc);
      var tokens = [];
      var current = '';
      var i;

      function flushCurrent() {
        var token = current.trim();
        if (token) tokens.push(token);
        current = '';
      }

      for (i = 0; i < text.length; i += 1) {
        var ch = text[i];
        if (ch === '{') {
          flushCurrent();
          var grace = '';
          i += 1;
          while (i < text.length && text[i] !== '}') {
            grace += text[i];
            i += 1;
          }
          grace = grace.trim();
          if (grace) tokens.push('GRACE:' + grace);
        } else if (ch === '|' || ch === '[' || ch === ']' || ch === '(' || ch === ')' || ch === ' ') {
          flushCurrent();
        } else {
          current += ch;
        }
      }
      flushCurrent();
      return tokens;
    }

    function parseGraceToken(token) {
      var text = String(token || '');
      if (text.indexOf('GRACE:') !== 0) return null;
      return text.slice(6).trim();
    }

    function parseAbcPitch(token) {
      var text = String(token || '');
      var pos = 0;
      var accidental = 0;
      while (text[pos] === '^' || text[pos] === '_' || text[pos] === '=') {
        if (text[pos] === '^') accidental += 1;
        if (text[pos] === '_') accidental -= 1;
        pos += 1;
      }
      var note = text[pos];
      var base = { C: 60, D: 62, E: 64, F: 65, G: 67, A: 69, B: 71, c: 72, d: 74, e: 76, f: 77, g: 79, a: 81, b: 83 };
      if (base[note] === undefined) return null;
      var midi = base[note] + accidental;
      pos += 1;
      while (pos < text.length) {
        if (text[pos] === ',') midi -= 12;
        if (text[pos] === APOST) midi += 12;
        pos += 1;
      }
      return midi;
    }

    function parseAbcStaffStep(token) {
      var text = String(token || '');
      var pos = 0;
      while (text[pos] === '^' || text[pos] === '_' || text[pos] === '=') pos += 1;
      var note = text[pos];
      var scale = { C: 0, D: 1, E: 2, F: 3, G: 4, A: 5, B: 6 };
      if (!note || scale[note.toUpperCase()] === undefined) return null;
      var octave = note >= 'a' && note <= 'g' ? 5 : 4;
      pos += 1;
      while (pos < text.length) {
        if (text[pos] === ',') octave -= 1;
        if (text[pos] === APOST) octave += 1;
        pos += 1;
      }
      return octave * 7 + scale[note.toUpperCase()];
    }

    function staffYForStep(step, staffTop) {
      var e4 = 4 * 7 + 2;
      var distanceFromE4 = step - e4;
      var bottomLineY = staffTop + 40;
      return bottomLineY - distanceFromE4 * 5;
    }

    function abcNoteName(token) {
      var text = String(token || '');
      var pos = 0;
      var accidentalText = '';
      while (text[pos] === '^' || text[pos] === '_' || text[pos] === '=') {
        if (text[pos] === '^') accidentalText = '#';
        if (text[pos] === '_') accidentalText = 'b';
        pos += 1;
      }
      return accidentalText + String(text[pos] || '').toUpperCase();
    }

    function parseDurationBeats(token) {
      var text = String(token || '');
      var numberText = '';
      var slashIndex = text.indexOf('/');
      for (var i = 0; i < text.length; i += 1) {
        var ch = text[i];
        if (ch >= '0' && ch <= '9') numberText += ch;
        if (ch === '/') break;
      }
      var whole = numberText ? Number(numberText) : 1;
      if (slashIndex !== -1) return whole * 0.25;
      return whole * 0.5;
    }

    function getMelodyEventsFromAbc(rawAbc, includeGrace) {
      var tokens = includeGrace ? tokenizeMelodyForPlayback(rawAbc) : tokenizeMelody(rawAbc);
      var events = [];
      var beat = 0;
      var pendingGrace = [];
      var graceDuration = 0.50;
      var minMainAfterGrace = 1 / 3;

      for (var i = 0; i < tokens.length; i += 1) {
        var token = tokens[i];
        var graceToken = parseGraceToken(token);
        if (graceToken) {
          pendingGrace.push(graceToken);
          continue;
        }

        var duration = parseDurationBeats(token);
        if (token[0] === 'z') {
          events.push({ type: 'rest', beat: beat, duration: duration, label: 'z' });
          beat += duration;
          pendingGrace = [];
          continue;
        }

        var midi = parseAbcPitch(token);
        if (midi !== null) {
          var mainBeat = beat;
          var mainDuration = duration;

          if (includeGrace && pendingGrace.length) {
            var availableGrace = Math.max(0.08, duration - minMainAfterGrace);
            var actualGraceDuration = Math.min(graceDuration, availableGrace);
            var graceStart = beat;

            for (var g = 0; g < pendingGrace.length; g += 1) {
              var graceMidi = parseAbcPitch(pendingGrace[g]);
              if (graceMidi !== null) {
                events.push({
                  type: 'grace',
                  midi: graceMidi,
                  staffStep: parseAbcStaffStep(pendingGrace[g]),
                  beat: graceStart + g * actualGraceDuration,
                  duration: actualGraceDuration,
                  label: abcNoteName(pendingGrace[g])
                });
              }
            }

            mainBeat = beat + actualGraceDuration * pendingGrace.length;
            mainDuration = Math.max(minMainAfterGrace, duration - actualGraceDuration * pendingGrace.length);
          }

          events.push({ type: 'note', midi: midi, staffStep: parseAbcStaffStep(token), beat: mainBeat, duration: mainDuration, label: abcNoteName(token) });
          beat += duration;
          pendingGrace = [];
        }
      }
      return events;
    }

    function totalBeatsFromEvents(events) {
      if (!events.length) return 0;
      var last = events[events.length - 1];
      return last.beat + last.duration;
    }

    function isAlignedToFourBeats(events) {
      var total = totalBeatsFromEvents(events);
      return Math.abs(total - Math.round(total / 4) * 4) < 0.0001;
    }

    function drawLedgerLines(parts, x, y, staffTop) {
      var bottom = staffTop + 40;
      var top = staffTop;
      var lineY;
      if (y > bottom + 4) {
        lineY = bottom + 10;
        while (lineY <= y + 3) {
          parts.push('<line x1="' + (x - 10) + '" y1="' + lineY + '" x2="' + (x + 10) + '" y2="' + lineY + '" stroke="#27231f" stroke-width="1"/>');
          lineY += 10;
        }
      }
      if (y < top - 4) {
        lineY = top - 10;
        while (lineY >= y - 3) {
          parts.push('<line x1="' + (x - 10) + '" y1="' + lineY + '" x2="' + (x + 10) + '" y2="' + lineY + '" stroke="#27231f" stroke-width="1"/>');
          lineY -= 10;
        }
      }
    }

    function drawRest(parts, x, y, duration) {
      if (duration >= 1) {
        parts.push('<rect x="' + (x - 7) + '" y="' + (y - 4) + '" width="14" height="5" fill="#27231f"/>');
      } else {
        parts.push('<text x="' + (x - 7) + '" y="' + (y + 8) + '" font-size="24" font-family="serif" fill="#27231f">𝄾</text>');
      }
    }

    function noteHeadAttrs(duration) {
      if (duration >= 1) return { fill: '#fff', stroke: '#27231f', strokeWidth: 1.5, stem: false, flag: false };
      return { fill: '#27231f', stroke: '#27231f', strokeWidth: 1, stem: true, flag: duration <= 0.5 };
    }

    function renderScore(updateMessage) {
      try {
        var events = getMelodyEventsFromAbc(abcInput.value);
        if (!events.length) throw new Error('メロディー音が見つかりませんでした。');

        var measuresPerSystem = 4;
        var beatsPerMeasure = 4;
        var systemCount = Math.max(1, Math.ceil(totalBeatsFromEvents(events) / (measuresPerSystem * beatsPerMeasure)));
        var left = 78;
        var right = 18;
        var systemWidth = 920;
        var measureWidth = (systemWidth - left - right) / measuresPerSystem;
        var beatWidth = measureWidth / beatsPerMeasure;
        var measureInnerLeft = 22;
        var measureInnerRight = 6;
        var drawableMeasureWidth = measureWidth - measureInnerLeft - measureInnerRight;
        var drawableBeatWidth = drawableMeasureWidth / beatsPerMeasure;
        var systemHeight = 132;
        var titleHeight = 42;
        var width = systemWidth;
        var height = titleHeight + systemCount * systemHeight + 28;
        var parts = [];

        parts.push('<svg xmlns="http://www.w3.org/2000/svg" width="' + width + '" height="' + height + '" viewBox="0 0 ' + width + ' ' + height + '">');
        parts.push('<rect x="0" y="0" width="' + width + '" height="' + height + '" fill="#fff"/>');
        parts.push('<text x="24" y="28" font-size="18" font-family="serif" fill="#27231f">C Major Modern Jazz Etude</text>');

        for (var s = 0; s < systemCount; s += 1) {
          var staffTop = titleHeight + 38 + s * systemHeight;
          var systemEndX = width - right;
          parts.push('<text x="28" y="' + (staffTop + 42) + '" font-size="44" font-family="serif" fill="#27231f">𝄞</text>');
          for (var line = 0; line < 5; line += 1) {
            var yLine = staffTop + line * 10;
            parts.push('<line x1="' + left + '" y1="' + yLine + '" x2="' + systemEndX + '" y2="' + yLine + '" stroke="#27231f" stroke-width="1"/>');
          }
          for (var m = 0; m <= measuresPerSystem; m += 1) {
            var barX = left + m * beatsPerMeasure * beatWidth;
            parts.push('<line x1="' + barX + '" y1="' + staffTop + '" x2="' + barX + '" y2="' + (staffTop + 40) + '" stroke="#27231f" stroke-width="1"/>');
          }
        }

        for (var j = 0; j < events.length; j += 1) {
          var ev = events[j];
          var systemIndex = Math.floor(ev.beat / (measuresPerSystem * beatsPerMeasure));
          var localBeat = ev.beat - systemIndex * measuresPerSystem * beatsPerMeasure;
          var staffTopForEvent = titleHeight + 38 + systemIndex * systemHeight;
          var measureIndex = Math.floor(localBeat / beatsPerMeasure);
          var beatInMeasure = localBeat - measureIndex * beatsPerMeasure;
          var x = left + measureIndex * measureWidth + measureInnerLeft + beatInMeasure * drawableBeatWidth;
          if (beatInMeasure >= 3) x -= 1;

          if (ev.type === 'rest') {
            drawRest(parts, x, staffTopForEvent + 20, ev.duration);
            continue;
          }

          var y = staffYForStep(ev.staffStep, staffTopForEvent);
          var attrs = noteHeadAttrs(ev.duration);
          drawLedgerLines(parts, x, y, staffTopForEvent);
          parts.push('<ellipse cx="' + x + '" cy="' + y + '" rx="5.8" ry="4.1" fill="' + attrs.fill + '" stroke="' + attrs.stroke + '" stroke-width="' + attrs.strokeWidth + '" transform="rotate(-18 ' + x + ' ' + y + ')"/>');

          if (attrs.stem) {
            var stemTop = y - 32;
            parts.push('<line x1="' + (x + 5.5) + '" y1="' + y + '" x2="' + (x + 5.5) + '" y2="' + stemTop + '" stroke="#27231f" stroke-width="1.4"/>');
            if (attrs.flag) {
              parts.push('<path d="M ' + (x + 5.5) + ' ' + stemTop + ' C ' + (x + 20) + ' ' + (stemTop + 5) + ', ' + (x + 18) + ' ' + (stemTop + 17) + ', ' + (x + 7) + ' ' + (stemTop + 21) + '" fill="none" stroke="#27231f" stroke-width="1.25"/>');
            }
          }

          if (ev.label.indexOf('#') === 0) parts.push('<text x="' + (x - 19) + '" y="' + (y + 4) + '" font-size="16" fill="#27231f">#</text>');
          if (ev.label.indexOf('b') === 0) parts.push('<text x="' + (x - 17) + '" y="' + (y + 4) + '" font-size="16" fill="#27231f">b</text>');
        }

        parts.push('</svg>');
        scoreEl.innerHTML = parts.join('');
        visualObj = { ok: true, eventCount: events.length };
        if (updateMessage !== false) setStatus('五線譜を表示しました。', false);
      } catch (error) {
        console.error(error);
        visualObj = null;
        scoreEl.innerHTML = '<div style="padding:16px;color:#b45309;line-height:1.7;">五線譜に変換できませんでした。<br><small>' + escapeHtml(error.message || String(error)) + '</small></div>';
        setStatus('五線譜に変換できませんでした。', true);
      }
    }

    function parseChordText(text) {
      return normalizeNewlines(text)
        .split(LF)
        .join('|')
        .split('|')
        .map(function(item) { return item.trim(); })
        .filter(function(item) { return item.length > 0; });
    }

    function chordToMidiRoot(chordName) {
      var name = String(chordName || '').trim();
      var roots = { C: 60, D: 62, E: 64, F: 65, G: 67, A: 69, B: 71 };
      var root = roots[name[0]];
      if (root === undefined) return 60;
      if (name[1] === '#') root += 1;
      if (name[1] === 'b' || name[1] === '♭') root -= 1;
      return root;
    }

    function chordVoicing(chordName) {
      var name = String(chordName || '').toLowerCase();
      if (name.indexOf('dm7b5') !== -1) return [62, 65, 68, 72, 75];
      if (name.indexOf('g7alt') !== -1) return [65, 68, 70, 75, 80];
      if (name.indexOf('cmmaj7') !== -1 || name.indexOf('cmmaj') !== -1) return [63, 71, 74, 79, 86];
      if (name.indexOf('cm7') !== -1) return [63, 70, 74, 79, 82];
      if (name.indexOf('am7b5') !== -1) return [60, 67, 70, 75, 79];
      if (name.indexOf('dm7') !== -1) return [62, 65, 69, 72, 76];
      if (name.indexOf('cmaj7') !== -1 && name.indexOf('#11') !== -1) return [64, 71, 74, 78, 83];
      if (name.indexOf('cmaj7') !== -1) return [64, 71, 74, 79, 83];
      if (name.indexOf('am7') !== -1) return [64, 67, 71, 74, 76];
      var root = chordToMidiRoot(chordName);
      return [root + 4, root + 10, root + 14];
    }

    function getChordEventsFromChordInput() {
      var names = parseChordText(chordInput.value);
      return names.map(function(name, index) { return { name: name, beat: index * 4 }; });
    }

    function ensureAudioContext() {
      var AudioCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtor) throw new Error('Web Audio API is not available in this browser.');
      if (!audioContext || audioContext.state === 'closed') {
        audioContext = new AudioCtor();
        setupOutputChain(audioContext);
      }
      return audioContext;
    }

    function setupOutputChain(ctx) {
      masterGain = ctx.createGain();
      masterGain.gain.value = 1.0;
      reverbDelay = ctx.createDelay(1.0);
      reverbDelay.delayTime.value = 0.16;
      var feedback = ctx.createGain();
      feedback.gain.value = 0.26;
      var tone = ctx.createBiquadFilter();
      tone.type = 'lowpass';
      tone.frequency.value = 2400;
      reverbDelay.connect(feedback);
      feedback.connect(tone);
      tone.connect(reverbDelay);
      reverbDelay.connect(ctx.destination);
      masterGain.connect(ctx.destination);
    }

    function midiToFreq(midi) {
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function makeDriveCurve(amount) {
      var samples = 256;
      var curve = new Float32Array(samples);
      var drive = Math.max(0, Math.min(1, amount || 0));
      var k = 30 * drive;
      for (var i = 0; i < samples; i += 1) {
        var x = i * 2 / samples - 1;
        curve[i] = (1 + k) * x / (1 + k * Math.abs(x));
      }
      return curve;
    }

    function scheduleTone(ctx, midi, start, duration, options) {
      var opts = Object.assign({ type: 'sine', gain: 0.1, filter: null, attack: 0.02, release: 0.05, sustain: 0.8, overlap: 0, slideFrom: null, slideTime: 0.055, reverbSend: 0.04, vibratoDepth: 0, vibratoRate: 5.2, drive: 0 }, options || {});
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      var filter = opts.filter ? ctx.createBiquadFilter() : null;
      var shaper = opts.drive ? ctx.createWaveShaper() : null;
      var sendGain = ctx.createGain();
      var safeDuration = Math.max(0.08, duration + opts.overlap);
      var volume = Number(volumeInput.value || 0.75);
      var targetGain = opts.gain * volume;
      var attack = Math.min(opts.attack, safeDuration * 0.35);
      var endTime = start + safeDuration;
      var releaseTime = Math.min(opts.release, safeDuration * 0.55);
      var releaseStart = Math.max(start + attack + 0.02, endTime - releaseTime);
      var targetFreq = midiToFreq(midi);

      osc.type = opts.type;
      if (opts.vibratoDepth > 0) {
        var lfo = ctx.createOscillator();
        var lfoGain = ctx.createGain();
        lfo.type = 'sine';
        lfo.frequency.setValueAtTime(opts.vibratoRate, start);
        lfoGain.gain.setValueAtTime(0, start);
        lfoGain.gain.linearRampToValueAtTime(opts.vibratoDepth, start + Math.min(0.18, safeDuration * 0.45));
        lfoGain.gain.linearRampToValueAtTime(opts.vibratoDepth * 0.75, endTime);
        lfo.connect(lfoGain);
        lfoGain.connect(osc.detune);
        lfo.start(start);
        lfo.stop(endTime + 0.08);
        activeNodes.push(lfo);
      }
      if (opts.slideFrom !== null) {
        osc.frequency.setValueAtTime(midiToFreq(opts.slideFrom), start);
        osc.frequency.exponentialRampToValueAtTime(targetFreq, start + Math.min(opts.slideTime, safeDuration * 0.72));
      } else {
        osc.frequency.setValueAtTime(targetFreq, start);
      }

      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.linearRampToValueAtTime(targetGain, start + attack);
      gain.gain.setValueAtTime(targetGain * opts.sustain, releaseStart);
      gain.gain.linearRampToValueAtTime(0.0001, endTime);

      if (shaper) {
        shaper.curve = makeDriveCurve(opts.drive);
        shaper.oversample = '2x';
      }

      if (filter) {
        filter.type = opts.filter.type;
        filter.frequency.setValueAtTime(opts.filter.frequency, start);
        filter.Q.setValueAtTime(opts.filter.q || 1, start);
        if (shaper) {
          osc.connect(shaper);
          shaper.connect(filter);
        } else {
          osc.connect(filter);
        }
        filter.connect(gain);
      } else {
        if (shaper) {
          osc.connect(shaper);
          shaper.connect(gain);
        } else {
          osc.connect(gain);
        }
      }

      sendGain.gain.value = opts.reverbSend;
      gain.connect(masterGain || ctx.destination);
      if (reverbDelay) {
        gain.connect(sendGain);
        sendGain.connect(reverbDelay);
      }
      osc.start(start);
      osc.stop(endTime + 0.08);
      activeNodes.push(osc);
    }

    function scheduleSlurTone(ctx, fromMidi, toMidi, start, graceDuration, mainDuration, options) {
      var opts = Object.assign({ type: 'sawtooth', gain: 0.13, filter: { type: 'bandpass', frequency: 760, q: 1.35 },
              vibratoDepth: 4.5,
              vibratoRate: 5.4,
              drive: 0.16, attack: 0.018, release: 0.16, reverbSend: 0.06, vibratoDepth: 0, vibratoRate: 5.2, drive: 0 }, options || {});
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      var filter = opts.filter ? ctx.createBiquadFilter() : null;
      var shaper = opts.drive ? ctx.createWaveShaper() : null;
      var sendGain = ctx.createGain();
      var volume = Number(volumeInput.value || 0.75);
      var targetGain = opts.gain * volume;
      var totalDuration = Math.max(0.12, graceDuration + mainDuration);
      var endTime = start + totalDuration;
      var graceHoldEnd = start + Math.max(0.025, graceDuration * 0.56);
      var slideEnd = start + Math.max(0.05, graceDuration * 0.96);
      var releaseStart = Math.max(start + 0.04, endTime - opts.release);

      osc.type = opts.type;
      if (opts.vibratoDepth > 0) {
        var lfo = ctx.createOscillator();
        var lfoGain = ctx.createGain();
        lfo.type = 'sine';
        lfo.frequency.setValueAtTime(opts.vibratoRate, start);
        lfoGain.gain.setValueAtTime(0, start);
        lfoGain.gain.linearRampToValueAtTime(opts.vibratoDepth, start + Math.min(0.2, totalDuration * 0.45));
        lfoGain.gain.linearRampToValueAtTime(opts.vibratoDepth * 0.75, endTime);
        lfo.connect(lfoGain);
        lfoGain.connect(osc.detune);
        lfo.start(start);
        lfo.stop(endTime + 0.08);
        activeNodes.push(lfo);
      }
      osc.frequency.setValueAtTime(midiToFreq(fromMidi), start);
      osc.frequency.setValueAtTime(midiToFreq(fromMidi), graceHoldEnd);
      osc.frequency.exponentialRampToValueAtTime(midiToFreq(toMidi), slideEnd);
      osc.frequency.setValueAtTime(midiToFreq(toMidi), slideEnd);

      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.linearRampToValueAtTime(targetGain * 0.94, start + opts.attack);
      gain.gain.setValueAtTime(targetGain * 0.94, graceHoldEnd);
      gain.gain.linearRampToValueAtTime(targetGain, slideEnd + 0.01);
      gain.gain.setValueAtTime(targetGain * 0.88, releaseStart);
      gain.gain.linearRampToValueAtTime(0.0001, endTime);

      if (shaper) {
        shaper.curve = makeDriveCurve(opts.drive);
        shaper.oversample = '2x';
      }

      if (filter) {
        filter.type = opts.filter.type;
        filter.frequency.setValueAtTime(opts.filter.frequency, start);
        filter.Q.setValueAtTime(opts.filter.q || 1, start);
        if (shaper) {
          osc.connect(shaper);
          shaper.connect(filter);
        } else {
          osc.connect(filter);
        }
        filter.connect(gain);
      } else {
        if (shaper) {
          osc.connect(shaper);
          shaper.connect(gain);
        } else {
          osc.connect(gain);
        }
      }

      sendGain.gain.value = opts.reverbSend;
      gain.connect(masterGain || ctx.destination);
      if (reverbDelay) {
        gain.connect(sendGain);
        sendGain.connect(reverbDelay);
      }
      osc.start(start);
      osc.stop(endTime + 0.08);
      activeNodes.push(osc);
    }

    function stopAudio(updateStatus) {
      timers.forEach(function(timerId) { window.clearTimeout(timerId); });
      timers = [];
      activeNodes.forEach(function(node) { try { node.stop(); } catch (error) {} });
      activeNodes = [];

      // スマホではAudioContextを閉じると、次のタップで再開できない場合があるため閉じない。
      if (updateStatus) setStatus('停止しました。', false);
    }

    function playDirectBeep(ctx, frequency, duration, gainValue) {
      var now = ctx.currentTime;
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(frequency || 880, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.linearRampToValueAtTime(gainValue || 0.7, now + 0.02);
      gain.gain.setValueAtTime(gainValue || 0.7, now + Math.max(0.04, duration - 0.08));
      gain.gain.linearRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + duration + 0.03);
      activeNodes.push(osc);
    }

    function unlockAudio() {
      try {
        var ctx = ensureAudioContext();
        return ctx.resume().then(function() {
          // スマホでは「有効化できたか」を確認できるよう、短い確認音を直接出す。
          playDirectBeep(ctx, 880, 0.22, 0.45);
          setStatus('音声を有効化しました。確認音が聞こえたら再生できます。AudioContext: ' + ctx.state, false);
          return ctx;
        }).catch(function(error) {
          console.error(error);
          setStatus('音声を有効化できませんでした。SafariまたはChromeで開き直してください。エラー: ' + escapeHtml(error.message || String(error)), true);
          return Promise.reject(error);
        });
      } catch (error) {
        console.error(error);
        setStatus('音声を有効化できませんでした。SafariまたはChromeで開き直してください。エラー: ' + escapeHtml(error.message || String(error)), true);
        return Promise.reject(error);
      }
    }

    function testSound() {
      try {
        stopAudio(false);
        unlockAudio().then(function(ctx) {
          playDirectBeep(ctx, 660, 0.45, 0.85);
          setStatus('テスト音を鳴らしました。AudioContext: ' + ctx.state, false);
        }).catch(function(error) {
          console.error(error);
          setStatus('テスト音も鳴りません。ブラウザの音量、ミュート、サイトの音声許可を確認してください。', true);
        });
      } catch (error) {
        console.error(error);
        setStatus('テスト音も鳴りません。ブラウザの音量、ミュート、サイトの音声許可を確認してください。', true);
      }
    }

    function playAudio() {
      try {
        stopAudio(false);
        var allEvents = getMelodyEventsFromAbc(abcInput.value, true);
        var melodyEvents = allEvents.filter(function(event) { return event.type === 'note' || event.type === 'grace'; });
        var chordEvents = getChordEventsFromChordInput();

        if (!melodyEvents.length) {
          setStatus('再生できるメロディー音が見つかりませんでした。', true);
          return;
        }

        unlockAudio().then(function(ctx) {
          var tempo = Number(tempoInput.value || 112);
          var secondsPerBeat = 60 / tempo;
          var now = ctx.currentTime + 0.08;

          for (var melodyIndex = 0; melodyIndex < melodyEvents.length; melodyIndex += 1) {
            var event = melodyEvents[melodyIndex];
            var nextMelody = melodyEvents[melodyIndex + 1];
            var previous = melodyEvents[melodyIndex - 1];
            var isGrace = event.type === 'grace';
            var followsGrace = previous && previous.type === 'grace';

            if (isGrace && nextMelody && nextMelody.type === 'note') {
              scheduleSlurTone(
                ctx,
                event.midi,
                nextMelody.midi,
                now + event.beat * secondsPerBeat,
                event.duration * secondsPerBeat,
                nextMelody.duration * secondsPerBeat * 0.96,
                {
                  type: 'triangle',
                  gain: 0.16,
                  attack: 0.006,
                  release: 0.36,
                  reverbSend: 0.045,
                  filter: { type: 'lowpass', frequency: 2600, q: 0.35 },
                  vibratoDepth: 0,
                  vibratoRate: 5.4,
                  drive: 0
                }
              );
              melodyIndex += 1;
              continue;
            }

            var isLegatoNote = previous && previous.type === 'note' && Math.abs(previous.midi - event.midi) <= 7;
            var slideFrom = isLegatoNote ? previous.midi : null;
            scheduleTone(ctx, event.midi, now + event.beat * secondsPerBeat, event.duration * secondsPerBeat * 0.98, {
              type: 'triangle',
              gain: followsGrace ? 0.15 : 0.14,
              attack: followsGrace ? 0.002 : 0.008,
              release: isLegatoNote ? 0.42 : 0.34,
              sustain: 0.54,
              overlap: isLegatoNote ? secondsPerBeat * 0.04 : 0,
              slideFrom: null,
              slideTime: 0.02,
              reverbSend: 0.045,
              filter: { type: 'lowpass', frequency: 2600, q: 0.35 }
            });

            scheduleTone(ctx, event.midi + 12, now + event.beat * secondsPerBeat, event.duration * secondsPerBeat * 0.92, {
              type: 'sine',
              gain: 0.045,
              attack: 0.006,
              release: isLegatoNote ? 0.36 : 0.28,
              sustain: 0.46,
              reverbSend: 0.035,
              filter: { type: 'lowpass', frequency: 4200, q: 0.25 },
              vibratoDepth: 0,
              vibratoRate: 5.4,
              drive: 0
            });
          }

          if (accompSelect.value === 'on') {
            chordEvents.forEach(function(event, index) {
              var nextBeat = chordEvents[index + 1] ? chordEvents[index + 1].beat : event.beat + 4;
              var chordDuration = Math.max(0.4, (nextBeat - event.beat) * secondsPerBeat * 1.2);
              var start = now + event.beat * secondsPerBeat;
              chordVoicing(event.name).forEach(function(midi, noteIndex) {
                scheduleTone(ctx, midi, start + noteIndex * 0.012, chordDuration, {
                  type: 'sine',
                  gain: 0.03,
                  attack: 0.08,
                  release: 0.65,
                  sustain: 0.78,
                  overlap: secondsPerBeat * 0.2,
                  reverbSend: 0.09,
                  filter: { type: 'lowpass', frequency: 1300, q: 0.45 }
                });
              });
            });
          }

          var totalBeats = totalBeatsFromEvents(allEvents);
          timers.push(window.setTimeout(function() {
            setStatus('再生が終了しました。', false);
          }, Math.max(800, (totalBeats * secondsPerBeat + 0.8) * 1000)));
          setStatus('再生中です。', false);
        }).catch(function(error) {
          console.error(error);
          setStatus('音声再生に失敗しました。まず「テスト音」が鳴るか確認してください。', true);
        });
      } catch (error) {
        console.error(error);
        setStatus('音声再生に失敗しました。まず「テスト音」が鳴るか確認してください。', true);
      }
    }

    function runTests() {
      var results = [];
      function assert(name, condition) { results.push({ name: name, pass: Boolean(condition) }); }

      assert('SAMPLE_ABC is not empty', SAMPLE_ABC.length > 20);
      assert('SAMPLE_ABC contains K:C', SAMPLE_ABC.indexOf('K:C') !== -1);
      assert('SAMPLE_ABC has no blank lines', SAMPLE_ABC.indexOf(LF + LF) === -1);
      assert('sample ABC has no visible chord symbols', hasChordSymbols(SAMPLE_ABC) === false);
      assert('stripChordSymbols removes quoted chords', stripChordSymbols(QUOTE + 'Dm7' + QUOTE + ' D2 | ' + QUOTE + 'G7alt' + QUOTE + ' G2 |').indexOf(QUOTE) === -1);
      assert('tokenizeMelody finds tokens', tokenizeMelody(SAMPLE_ABC).length > 8);
      assert('melody parser finds events', getMelodyEventsFromAbc(SAMPLE_ABC).length > 8);
      assert('melody parser keeps rests', getMelodyEventsFromAbc(SAMPLE_ABC).some(function(event) { return event.type === 'rest'; }));
      assert('playback tokenizer keeps grace notes', tokenizeMelodyForPlayback('D2 {^F}G |').some(function(token) { return token === 'GRACE:^F'; }));
      assert('playback tokenizer keeps G-sharp grace notes', tokenizeMelodyForPlayback('F A {^G}A c |').some(function(token) { return token === 'GRACE:^G'; }));
      assert('playback events include grace notes', getMelodyEventsFromAbc('D2 {^F}G |', true).some(function(event) { return event.type === 'grace'; }));
      assert('G-sharp to A grace is handled', getMelodyEventsFromAbc('F A {^G}A c |', true).some(function(event) { return event.type === 'grace' && event.label === '#G'; }));
      assert('grace note uses triplet 1-part pickup', Math.abs(getMelodyEventsFromAbc('D2 {^F}G |', true).filter(function(event) { return event.type === 'grace'; })[0].duration - (1 / 6)) < 0.0001);
      assert('main note after grace keeps triplet 2-parts', Math.abs(getMelodyEventsFromAbc('D2 {^F}G |', true).filter(function(event) { return event.type === 'note'; })[1].duration - (1 / 3)) < 0.0001);
      assert('main note after grace is delayed inside its beat', getMelodyEventsFromAbc('D2 {^F}G |', true).filter(function(event) { return event.type === 'note'; })[1].beat > 1);
      assert('score events ignore grace notes', getMelodyEventsFromAbc('D2 {^F}G |').some(function(event) { return event.type === 'grace'; }) === false);
      assert('sample etude total beats align to 4/4 bars', isAlignedToFourBeats(getMelodyEventsFromAbc(SAMPLE_ABC)) === true);
      assert('sample etude has 16 bars', totalBeatsFromEvents(getMelodyEventsFromAbc(SAMPLE_ABC)) === 64);
      assert('bar 3 is corrected to 4 beats', getMelodyEventsFromAbc('E2 z G B ^F G d |').reduce(function(sum, event) { return sum + event.duration; }, 0) === 4);
      assert('G altered bar contains Db and Eb colors', getMelodyEventsFromAbc('_B _A G B _D _E F G |').some(function(event) { return event.label === 'bD'; }) && getMelodyEventsFromAbc('_B _A G B _D _E F G |').some(function(event) { return event.label === 'bE'; }));
      assert('flat B is drawn on B staff position', parseAbcStaffStep('_B') === parseAbcStaffStep('B'));
      assert('flat A is drawn on A staff position', parseAbcStaffStep('_A') === parseAbcStaffStep('A'));
      assert('flat D is drawn on D staff position', parseAbcStaffStep('_D') === parseAbcStaffStep('D'));
      assert('quarter note duration is 1 beat', parseDurationBeats('D2') === 1);
      assert('eighth note duration is 0.5 beat', parseDurationBeats('D') === 0.5);
      assert('quarter note is open notehead', noteHeadAttrs(1).fill === '#fff');
      assert('eighth note has stem and flag', noteHeadAttrs(0.5).stem === true && noteHeadAttrs(0.5).flag === true);
      assert('sample melody ends on high c for stable score rendering', SAMPLE_ABC.trim().endsWith('c |'));
      assert('sample chord chart has 16 bars', parseChordText(SAMPLE_CHORDS).length === 16);
      assert('parseChordText accepts one-line chart', parseChordText('Dm7 | G7alt | Cmaj7 | Am7 |').length === 4);
      assert('parseChordText accepts multiline chart', parseChordText('Dm7 | G7alt' + LF + 'Cmaj7 | Am7').length === 4);
      assert('Cmaj7(#11) voicing includes F# color', chordVoicing('Cmaj7(#11)').indexOf(78) !== -1);
      assert('previous major chord chart starts with Dm7', parseChordText(SAMPLE_CHORDS)[0] === 'Dm7');
      assert('C Major phrase is restored in ABC sample', SAMPLE_ABC.indexOf('K:C') !== -1 && SAMPLE_ABC.indexOf('E2 z G B ^F G d') !== -1);
      assert('textarea tag exists', document.getElementById('abcInput') !== null);
      assert('chord textarea exists', document.getElementById('chordInput') !== null);
      assert('score tag exists', document.getElementById('score') !== null);
      assert('buttons exist', document.getElementById('playBtn') !== null && document.getElementById('testBtn') !== null);
      assert('testSound uses scheduleTone', String(testSound).indexOf('scheduleTone') !== -1);
      assert('stopAudio keeps AudioContext for mobile', String(stopAudio).indexOf('audioContext.close') === -1);
      assert('unlock audio button exists', document.getElementById('unlockAudioBtn') !== null);
      assert('unlockAudio function exists', typeof unlockAudio === 'function');
      assert('direct mobile beep function exists', typeof playDirectBeep === 'function');
      assert('unlockAudio plays audible confirmation beep', String(unlockAudio).indexOf('playDirectBeep') !== -1);
      assert('custom renderer function exists', typeof renderScore === 'function');
      assert('rest drawing function exists', typeof drawRest === 'function');
      assert('staff position function exists', typeof staffYForStep === 'function');
      assert('output chain setup function exists', typeof setupOutputChain === 'function');
      assert('scheduleTone supports smoothing options', String(scheduleTone).indexOf('slideFrom') !== -1 && String(scheduleTone).indexOf('release') !== -1);
      assert('tone engine has vibrato support available', String(scheduleTone).indexOf('vibratoDepth') !== -1 && String(scheduleSlurTone).indexOf('vibratoDepth') !== -1);
      assert('tone engine has gentle drive support available', typeof makeDriveCurve === 'function' && String(scheduleTone).indexOf('createWaveShaper') !== -1);
      assert('slur tone scheduler exists', typeof scheduleSlurTone === 'function');
      assert('slur keeps grace pitch before sliding', String(scheduleSlurTone).indexOf('graceHoldEnd') !== -1);
      assert('slur holds grace pitch longer', String(scheduleSlurTone).indexOf('graceDuration * 0.56') !== -1);
      assert('slur makes grace portion more audible', String(scheduleSlurTone).indexOf('targetGain * 0.94') !== -1);
      assert('grace-to-main uses one oscillator slur', String(playAudio).indexOf('scheduleSlurTone') !== -1);
      assert('grace slur playback is slightly louder', String(playAudio).indexOf('gain: 0.145') !== -1);
      assert('melody playback uses piano-like triangle tone', String(playAudio).indexOf("type: 'triangle'") !== -1);
      assert('melody playback disables sax vibrato', String(playAudio).indexOf('vibratoDepth: 4.5') === -1);
      assert('melody playback disables sax drive', String(playAudio).indexOf('drive: 0.16') === -1);
      assert('playAudio no longer depends on visualObj before sounding', String(playAudio).indexOf('if (!visualObj) return') === -1);
      assert('playAudio is non-async function for compatibility', String(playAudio).indexOf('async function') === -1);
      assert('melody playback is one octave lower', String(playAudio).indexOf('event.midi + 24') === -1 && String(playAudio).indexOf('event.midi + 12, now') !== -1);
      assert('main note after grace is gently accented', String(playAudio).indexOf('followsGrace ? 0.15') !== -1);
      assert('piano melody does not slide between normal notes', String(playAudio).indexOf('slideFrom: null') !== -1);
      assert('G-sharp to A slide distance is smooth', Math.abs(parseAbcPitch('^G') - parseAbcPitch('A')) <= 5);
      assert('main note after grace has legato attack', String(playAudio).indexOf('followsGrace ? 0.0001') !== -1);
      assert('piano melody uses short slide time setting', String(playAudio).indexOf('slideTime: 0.02') !== -1);
      assert('legato notes have softer attack', String(playAudio).indexOf('isLegatoNote ? 0.006') !== -1);
      assert('legato notes overlap more', String(playAudio).indexOf('isLegatoNote ? secondsPerBeat * 0.18') !== -1);
      assert('grace note no longer uses separate oscillator settings in playAudio', String(playAudio).indexOf('isGrace ? 0.58 : 0.96') === -1);
      assert('slur avoids separate grace oscillator clicks', String(playAudio).indexOf('melodyIndex += 1') !== -1);
      assert('grace note no longer steals time from previous note', getMelodyEventsFromAbc('D2 {^F}G |', true).filter(function(event) { return event.type === 'grace'; })[0].beat === 1);

      var html = ['<strong>Self tests</strong>', '<ul>'];
      results.forEach(function(result) {
        html.push('<li class="' + (result.pass ? 'ok' : 'error') + '">' + (result.pass ? 'OK: ' : 'NG: ') + result.name + '</li>');
      });
      html.push('</ul>');
      testPanel.innerHTML = html.join('');
      return results.every(function(result) { return result.pass; });
    }

    document.getElementById('renderBtn').addEventListener('click', function() { renderScore(true); });
    document.getElementById('unlockAudioBtn').addEventListener('click', unlockAudio);
    document.getElementById('playBtn').addEventListener('click', playAudio);
    document.getElementById('stopBtn').addEventListener('click', function() { stopAudio(true); });
    document.getElementById('testBtn').addEventListener('click', testSound);
    document.getElementById('sampleBtn').addEventListener('click', function() {
      abcInput.value = SAMPLE_ABC;
      chordInput.value = SAMPLE_CHORDS;
      tempoInput.value = 112;
      renderScore(true);
      runTests();
    });
    tempoInput.addEventListener('change', function() { renderScore(true); });

    renderScore(true);
    runTests();
  </script>
</body>
</html>
